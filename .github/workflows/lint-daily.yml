name: lint-daily

on:
  schedule:
    # 04:00 UTC daily — well after most US business hours, gives a fresh snapshot for EU morning
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      discover:
        description: "Crawl GitHub topic search beyond seed list"
        type: boolean
        default: false
      limit:
        description: "Max repos per topic during discovery"
        type: number
        default: 200

permissions:
  contents: write   # required for: commit data/, push tags, create releases

concurrency:
  group: lint-daily
  cancel-in-progress: false

jobs:
  lint:
    name: Discover, fetch, lint, snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout (main, code only)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Crawl seed list (always)
        run: python linter/crawler.py --cache .cache --seed tests/regression/seed.txt

      - name: Discover via topic search (manual trigger only)
        if: ${{ inputs.discover == true }}
        run: |
          python linter/crawler.py --cache .cache \
            --seed tests/regression/seed.txt \
            --discover --limit ${{ inputs.limit || 200 }}

      - name: Run lint
        run: python linter/lint.py --cache .cache --out data

      - name: Pack snapshot tarball
        id: snapshot
        run: |
          DATE=$(date -u +%Y-%m-%d)
          tar -czf snapshot-${DATE}.tar.gz -C data .
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "size=$(du -h snapshot-${DATE}.tar.gz | cut -f1)" >> "$GITHUB_OUTPUT"
          ls -la snapshot-${DATE}.tar.gz

      - name: Publish snapshot to GitHub Releases (history archive)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: snapshot-${{ steps.snapshot.outputs.date }}
          name: "Daily snapshot ${{ steps.snapshot.outputs.date }}"
          body: |
            Daily lint snapshot from MCPRated.

            Size: ${{ steps.snapshot.outputs.size }}
            Rule set: v1.0.0
            Generated by: lint-daily workflow

            Extract:
            ```
            curl -L https://github.com/${{ github.repository }}/releases/download/snapshot-${{ steps.snapshot.outputs.date }}/snapshot-${{ steps.snapshot.outputs.date }}.tar.gz | tar xzf -
            ```
          files: snapshot-${{ steps.snapshot.outputs.date }}.tar.gz
          make_latest: false
          fail_on_unmatched_files: true

      # Note: gh-pages deploy of build/ is in a separate workflow (deploy-pages.yml)
      # so we can iterate on the site without re-running the full lint.
